<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Modern To-Do List</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-circle-check logo-icon"></i>
                <h1>Task<span>Flow</span></h1>
            </div>
            
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
                <i class="fa-solid fa-moon moon-icon"></i>
                <i class="fa-solid fa-sun sun-icon"></i>
            </button>
        </header>

        <main class="app-main">
            <!-- Task Creator Section -->
            <section class="task-form-card">
                <form id="task-form" class="task-form">
                    <div class="form-inputs-group">
                        <div class="input-wrapper main-input">
                            <i class="fa-solid fa-pen-to-square input-icon"></i>
                            <input type="text" id="task-title-input" placeholder="What needs to be done?" required autocomplete="off">
                        </div>
                        
                        <div class="input-wrapper date-input">
                            <i class="fa-regular fa-calendar input-icon"></i>
                            <input type="date" id="task-due-date" aria-label="Due date">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary add-task-btn">
                        <i class="fa-solid fa-plus"></i>
                        <span>Add Task</span>
                    </button>
                </form>
            </section>

            <!-- Task Dashboard (Search & Filters) -->
            <section class="task-dashboard-card">
                <div class="dashboard-controls">
                    <!-- Search Input -->
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="search-input" placeholder="Search tasks..." autocomplete="off">
                        <button id="clear-search-btn" class="clear-search-btn" style="display: none;">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <!-- Category Filters -->
                    <div class="filters-group">
                        <button class="filter-btn active" data-filter="all">
                            All <span class="count-badge" id="count-all">0</span>
                        </button>
                        <button class="filter-btn" data-filter="active">
                            Active <span class="count-badge" id="count-active">0</span>
                        </button>
                        <button class="filter-btn" data-filter="completed">
                            Completed <span class="count-badge" id="count-completed">0</span>
                        </button>
                    </div>
                </div>

                <!-- Task List Section -->
                <div class="task-list-wrapper">
                    <!-- Loading Indicator -->
                    <div id="loading-indicator" class="loading-state" style="display: none;">
                        <div class="spinner"></div>
                        <p>Loading your tasks...</p>
                    </div>

                    <!-- Empty State -->
                    <div id="empty-state" class="empty-state">
                        <div class="empty-illustration">
                            <!-- Premium SVG Illustration for empty state -->
                            <svg viewBox="0 0 120 120" class="empty-svg">
                                <circle cx="60" cy="60" r="50" class="svg-bg" />
                                <path d="M45,60 L55,70 L75,50" class="svg-check" />
                                <line x1="25" y1="20" x2="35" y2="30" class="svg-sparkle" />
                                <line x1="95" y1="20" x2="85" y2="30" class="svg-sparkle" />
                                <line x1="60" y1="105" x2="60" y2="95" class="svg-sparkle" />
                            </svg>
                        </div>
                        <h3 id="empty-title">All tasks completed!</h3>
                        <p id="empty-subtitle">Time to sit back and relax, or add a new task to get started.</p>
                    </div>

                    <!-- Main Tasks Container -->
                    <ul id="task-list" class="task-list">
                        <!-- Tasks dynamically injected by JavaScript -->
                    </ul>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>TaskFlow &copy; 2026. Made with <i class="fa-solid fa-heart footer-heart"></i> for productivity.</p>
        </footer>
    </div>

    <!-- Custom Premium Delete Confirmation Modal -->
    <div id="delete-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-warning-icon">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h2>Delete Task?</h2>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this task? This action cannot be undone.</p>
                <div class="modal-task-preview" id="modal-task-preview-title"></div>
            </div>
            <div class="modal-footer">
                <button id="cancel-delete-btn" class="btn btn-secondary">Cancel</button>
                <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Custom Script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
